<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="icon" href="icon192x192.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賭けボトルフリップ</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #555;
            z-index: 10;
        }
        .stats-col { display: flex; flex-direction: column; gap: 5px; }
        .text-red { color: #ff4757; }
        .text-green { color: #2ed573; }
        .text-gold { color: #f1c40f; }
        #env-display {
            text-align: center;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        #game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #gauge-container {
            width: 80%;
            height: 30px;
            background: #333;
            border: 4px solid #fff;
            position: relative;
            margin-bottom: 40px;
            overflow: hidden;
        }
        #target-zone {
            height: 100%;
            background: rgba(46, 213, 115, 0.6);
            position: absolute;
            top: 0;
            left: 35%;
            width: 30%;
            transition: width 0.3s;
        }
        #cursor {
            width: 10px;
            height: 100%;
            background: #ff4757;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 10px #ff4757;
        }
        #bottle {
            font-size: 80px;
            transition: transform 0.1s;
            position: relative;
            z-index: 10;
        }
        .flip-anim { animation: flip 1s ease-in-out forwards; }
        @keyframes flip {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-150px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }
        .shoot-anim { animation: shoot 0.5s ease-in forwards; }
        @keyframes shoot {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(3) rotate(90deg) translateX(50px); filter: brightness(2) drop-shadow(0 0 20px red); }
            100% { transform: scale(10) rotate(90deg) translateX(100px); opacity: 0; }
        }
        #swipe-area {
            width: 100%;
            height: 25vh;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px dashed #777;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 20px;
            touch-action: none;
            z-index: 10;
        }
        #controls {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: 4px solid #fff;
            cursor: pointer;
            font-family: 'DotGothic16', sans-serif;
        }
        #btn-borrow { background: #ffaa00; color: #000; }
        #btn-next { background: #2ed573; color: #fff; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay-screen.active { opacity: 1; pointer-events: auto; }
        .overlay-screen {
            border: 8px double #fff;
        }
        #result-overlay h1 { font-size: 32px; margin-bottom: 20px; text-align: center; }
        #result-overlay p { font-size: 18px; margin-bottom: 30px; text-align: center; line-height: 1.5; }
        #btn-restart { background: #fff; color: #000; padding: 15px 30px; font-size: 18px; }
        #shop-overlay h1 { font-size: 28px; color: #9b59b6; margin-bottom: 10px; text-shadow: 0 0 10px #9b59b6; }
        #shop-overlay p { margin-bottom: 20px; color: #ccc; }
        .buff-cards {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
        }
        .buff-card {
            background: #2c3e50;
            border: 4px solid #fff;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }
        .buff-card:active { transform: scale(0.95); }
        .buff-card h3 { font-size: 18px; margin-bottom: 5px; color: #f1c40f; }
        .buff-card p { font-size: 14px; color: #fff; margin: 0; }
        #flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: red; z-index: 50; opacity: 0; pointer-events: none;
        }
        .flash-anim { animation: flashRed 0.5s ease-out; }
        @keyframes flashRed { 0% { opacity: 0.8; } 100% { opacity: 0; } }
    </style>
</head>
<body class="crt">
    <header>
        <div class="stats-col">
            <div>所持金: <span id="money" class="text-green">¥10,000</span></div>
            <div>借金: <span id="debt" class="text-red">¥0</span></div>
        </div>
        <div class="stats-col" style="text-align: right;">
            <div>Stage: <span id="stage">1</span></div>
            <div>没収額: <span id="penalty" class="text-red">¥5,000</span></div>
        </div>
    </header>
    <div id="env-display">【環境】静かな路地裏</div>
    <div id="game-area">
        <div id="flash"></div>
        <div id="gauge-container">
            <div id="target-zone"></div>
            <div id="cursor"></div>
        </div>
        <div id="bottle">🍾</div>
    </div>
    <div id="swipe-area">👆 上にスワイプしてフリップ</div>
    <div id="controls">
        <button id="btn-borrow">借入 (¥1万)</button>
        <button id="btn-gacha">ガチャ (¥3,000)</button>
        <button id="btn-collection">図鑑</button>
        <button id="btn-achievements">実績</button>
        <button id="btn-next" disabled>闇市へ進む</button>
    </div>
    <div id="result-overlay" class="overlay-screen">
        <h1 id="overlay-title">結果</h1>
        <p id="overlay-msg">メッセージ</p>
        <button id="btn-restart" style="display:none;">輪廻転生 (リスタート)</button>
    </div>
    <div id="shop-overlay" class="overlay-screen">
        <h1>◆ 闇市 ◆</h1>
        <p>生き残るための取引をしよう。</p>
        <div class="buff-cards" id="buff-cards-container">
            </div>
        <button onclick="document.getElementById('shop-overlay').classList.remove('active'); startGauge();" style="margin-top:20px;">閉じる</button>
    </div>
    <div id="gacha-overlay" class="overlay-screen">
        <h1 id="gacha-title">ガチャ</h1>
        <div id="gacha-result-bottle" style="font-size: 100px; margin: 20px;">?</div>
        <p id="gacha-msg"></p>
        <button onclick="document.getElementById('gacha-overlay').classList.remove('active'); startGauge();">閉じる</button>
    </div>
    <div id="collection-overlay" class="overlay-screen">
        <h1>◆ 図鑑 ◆</h1>
        <div id="collection-list" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px; overflow-y: auto; max-height: 50vh;"></div>
        <button onclick="document.getElementById('collection-overlay').classList.remove('active'); startGauge();">閉じる</button>
    </div>
    <div id="achievements-overlay" class="overlay-screen">
        <h1>◆ 実績 ◆</h1>
        <div id="achievements-list" style="width: 80%; max-height: 60vh; overflow-y: auto; margin: 20px 0;"></div>
        <button onclick="document.getElementById('achievements-overlay').classList.remove('active'); startGauge();">閉じる</button>
    </div>
<script>
    let state = {
        money: 10000,
        debt: 0,
        stage: 1,
        isFlipping: false,
        unlockedBottles: ['🍾'],
        currentBottle: '🍾',
        gaugePos: 0,
        gaugeDir: 1,
        animFrame: null,
        gameOver: false,
        baseTargetWidth: 30,
        baseSpeed: 1.2,
        basePenalty: 5000,
        baseReward: 8000,
        buffs: {
            widthBonus: 0,
            speedMod: 1.0,
            rewardMod: 1.0,
            penaltyMod: 1.0
        },
        consecutiveWins: 0,
        bestConsecutiveWins: 0,
        unlockedAchievements: [],
        lastFlipDist: 100
    };
    const achievementsList = [
        { id: 'streak_3', name: '三連勝の心得', desc: '3回連続で成功する' },
        { id: 'streak_7', name: 'フリップの達人', desc: '7回連続で成功する' },
        { id: 'streak_15', name: '伝説のフリッパー', desc: '15回連続で成功する' },
        { id: 'perfect_center', name: '針の穴を通す', desc: '安全バーのど真ん中で成功する' },
        { id: 'debt_king', name: '借金王', desc: '借金総額が100万円を突破する' },
        { id: 'high_roller', name: '富豪', desc: '所持金が100万円を突破する' },
        { id: 'stage_100', name: '世界の果て', desc: 'ステージ100に到達する' }
    ];
    const environments = [
        { name: "静かな路地裏", bg: "#2c3e50", speed: 1.2, width: 35, penalty: 5000, reward: 8000 },
        { name: "地下の違法バー", bg: "#4a2311", speed: 1.8, width: 28, penalty: 12000, reward: 20000 },
        { name: "揺れるクルーザー", bg: "#004466", speed: 2.8, width: 22, penalty: 30000, reward: 50000 },
        { name: "マフィアの拷問部屋", bg: "#330000", speed: 4.0, width: 16, penalty: 80000, reward: 150000 },
        { name: "狂気のVIPルーム", bg: "#1a0033", speed: 6.0, width: 10, penalty: 200000, reward: 500000 },
        { name: "電脳の吹き溜まり", bg: "#00ff41", speed: 8.0, width: 8, penalty: 500000, reward: 1200000 },
        { name: "宇宙の断崖", bg: "#000022", speed: 10.0, width: 6, penalty: 1500000, reward: 4000000 },
        { name: "神々の遊戯場", bg: "#ffffff", speed: 15.0, width: 4, penalty: 5000000, reward: 15000000 }
    ];
    const buffPool = [
        { id: 'width', name: "動体視力強化", desc: "安全地帯の幅が少し広がる", apply: () => state.buffs.widthBonus += 4 },
        { id: 'slow', name: "精神統一", desc: "ゲージの移動速度が15%遅くなる", apply: () => state.buffs.speedMod *= 0.85 },
        { id: 'reward', name: "スポンサー契約", desc: "成功時の報酬額が20%アップ", apply: () => state.buffs.rewardMod *= 1.2 },
        { id: 'penalty', name: "裏工作", desc: "失敗時の没収額が20%ダウン", apply: () => state.buffs.penaltyMod *= 0.8 },
        { id: 'money', name: "闇の給付金", desc: "即座に ¥20,000 を獲得する", apply: () => { state.money += 20000; updateUI(); } }
    ];
    const elMoney = document.getElementById('money');
    const elDebt = document.getElementById('debt');
    const elStage = document.getElementById('stage');
    const elPenalty = document.getElementById('penalty');
    const elEnv = document.getElementById('env-display');
    const elCursor = document.getElementById('cursor');
    const elTarget = document.getElementById('target-zone');
    const elBottle = document.getElementById('bottle');
    const elSwipeArea = document.getElementById('swipe-area');
    const btnBorrow = document.getElementById('btn-borrow');
    const btnNext = document.getElementById('btn-next');
    const resultOverlay = document.getElementById('result-overlay');
    const shopOverlay = document.getElementById('shop-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const btnRestart = document.getElementById('btn-restart');
    const elFlash = document.getElementById('flash');
    const buffCardsContainer = document.getElementById('buff-cards-container');
    const bottleList = ['🍼', '🥤', '🧋', '🍺', '🍷', '🥃', '🍸', '🍹', '🍶', '🍾', '🏺', '🧪', '🧴', '🧂', '🍯'];
    function initGame() {
        const currentUnlocked = state.unlockedAchievements;
        state = {
            money: 10000, debt: 0, stage: 1, isFlipping: false, gaugePos: 0, gaugeDir: 1, animFrame: null, gameOver: false,
            buffs: { widthBonus: 0, speedMod: 1.0, rewardMod: 1.0, penaltyMod: 1.0 },
            unlockedBottles: ['🍾'],
            currentBottle: '🍾',
            consecutiveWins: 0,
            bestConsecutiveWins: 0,
            unlockedAchievements: currentUnlocked,
            lastFlipDist: 100
        };
        const saved = localStorage.getItem('achievements');
        if (saved) state.unlockedAchievements = JSON.parse(saved);
        elBottle.classList.remove('shoot-anim');
        btnRestart.style.display = 'none';
        resultOverlay.classList.remove('active');
        shopOverlay.classList.remove('active');
        applyEnvironment();
        updateUI();
        startGauge();
    }
    function updateUI() {
        elMoney.innerText = `¥${Math.floor(state.money).toLocaleString()}`;
        elDebt.innerText = `¥${Math.floor(state.debt).toLocaleString()}`;
        elStage.innerText = state.stage;
        elBottle.innerText = state.currentBottle;
        const currentEnv = getEnvData();
        const displayPenalty = Math.floor(currentEnv.penalty * state.buffs.penaltyMod);
        elPenalty.innerText = `¥${displayPenalty.toLocaleString()}`;
        elTarget.style.left = `${state.targetLeft}%`;
        elTarget.style.width = `${state.targetWidth}%`;
    }
    function getEnvData() {
        const envIndex = Math.min(state.stage - 1, environments.length - 1);
        let env = { ...environments[envIndex] };
        if (state.stage > environments.length) {
            const diff = state.stage - environments.length;
            env.speed += diff * 1.5;
            env.width = Math.max(1, env.width - diff * 0.5);
            env.penalty *= Math.pow(2.0, diff);
            env.reward *= Math.pow(2.0, diff);
            const prefixes = ["真・", "極・", "超・", "幻・", "終焉の", "無限の"];
            const prefix = prefixes[Math.floor((state.stage * 0.1) % prefixes.length)];
            env.name = `${prefix}${env.name} (Lv.${state.stage})`;
            const hue = (state.stage * 137) % 360;
            env.bg = `hsl(${hue}, 40%, 10%)`;
        }
        return env;
    }
    function applyEnvironment() {
        const env = getEnvData();
        state.gaugeSpeed = Math.max(0.5, env.speed * state.buffs.speedMod);
        state.targetWidth = Math.min(80, env.width + state.buffs.widthBonus); 
        state.penalty = Math.floor(env.penalty * state.buffs.penaltyMod);
        state.reward = Math.floor(env.reward * state.buffs.rewardMod);
        document.body.style.backgroundColor = env.bg;
        elEnv.innerText = `【環境】${env.name}`;
        state.targetLeft = Math.random() * (100 - state.targetWidth);
    }
    function startGauge() {
        if(state.animFrame) cancelAnimationFrame(state.animFrame);
        function loop() {
            if (state.isFlipping || state.gameOver) return;
            state.gaugePos += state.gaugeSpeed * state.gaugeDir;
            if (state.gaugePos >= 100) { state.gaugePos = 100; state.gaugeDir = -1; }
            if (state.gaugePos <= 0) { state.gaugePos = 0; state.gaugeDir = 1; }
            elCursor.style.left = `calc(${state.gaugePos}% - 5px)`;
            state.animFrame = requestAnimationFrame(loop);
        }
        loop();
    }
    let startY = 0;
    function handleSwipeStart(y) { if (!state.isFlipping && !state.gameOver) startY = y; }
    function handleSwipeEnd(y) {
        if (state.isFlipping || state.gameOver) return;
        if (startY - y > 50) flipBottle();
    }
    elSwipeArea.addEventListener('touchstart', e => handleSwipeStart(e.touches[0].clientY));
    elSwipeArea.addEventListener('touchend', e => handleSwipeEnd(e.changedTouches[0].clientY));
    let isMouseDown = false;
    elSwipeArea.addEventListener('mousedown', e => { isMouseDown = true; handleSwipeStart(e.clientY); });
    elSwipeArea.addEventListener('mouseup', e => { if(isMouseDown) { handleSwipeEnd(e.clientY); isMouseDown = false; }});
    elSwipeArea.addEventListener('mouseleave', () => isMouseDown = false);
    function flipBottle() {
        state.isFlipping = true;
        btnBorrow.disabled = true;
        elBottle.classList.remove('flip-anim');
        void elBottle.offsetWidth;
        elBottle.classList.add('flip-anim');
        setTimeout(() => { elBottle.classList.remove('flip-anim'); judgeResult(); }, 1000);
    }
    function judgeResult() {
        const cursorCenter = state.gaugePos;
        if (cursorCenter >= state.targetLeft && cursorCenter <= state.targetLeft + state.targetWidth) {
            state.money += state.reward;
            state.consecutiveWins++;
            state.bestConsecutiveWins = Math.max(state.bestConsecutiveWins, state.consecutiveWins);
            const targetCenter = state.targetLeft + state.targetWidth / 2;
            state.lastFlipDist = Math.abs(cursorCenter - targetCenter);
            overlayTitle.innerText = "SUCCESS!";
            overlayTitle.style.color = "#2ed573";
            overlayMsg.innerText = `見事なフリップ！\n賞金 ¥${state.reward.toLocaleString()} を獲得した。`;
            showResult(false);
            btnNext.disabled = false;
        } else {
            state.consecutiveWins = 0;
            state.money -= state.penalty;
            overlayTitle.innerText = "FAILED...";
            overlayTitle.style.color = "#ff4757";
            if (state.money <= 0) {
                state.money = 0;
                updateUI();
                triggerDeath();
                return;
            } else {
                overlayMsg.innerText = `タイミングがずれた！\n没収額 ¥${state.penalty.toLocaleString()} を支払った。`;
                showResult(false);
            }
        }
        updateUI();
        checkAchievements();
    }
    function triggerDeath() {
        state.gameOver = true;
        elFlash.classList.add('flash-anim');
        setTimeout(() => elFlash.classList.remove('flash-anim'), 500);
        elBottle.classList.add('shoot-anim');
        setTimeout(() => {
            overlayTitle.innerText = "YOU DIED";
            overlayTitle.style.color = "red";
            overlayMsg.innerHTML = `所持金が尽きました。<br>ペットボトルから発砲され、あなたは死にました。<br><br><span style="color:#aaa; font-size:14px;">到達ステージ: ${state.stage} / 最終借金: ¥${state.debt.toLocaleString()}</span>`;
            showResult(true);
        }, 600);
    }
    function showResult(isGameOver) {
        resultOverlay.classList.add('active');
        if (isGameOver) {
            btnRestart.style.display = 'block';
            btnNext.disabled = true;
            btnBorrow.disabled = true;
        } else {
            setTimeout(() => {
                resultOverlay.classList.remove('active');
                if(!btnNext.disabled) {
                } else {
                    state.isFlipping = false;
                    btnBorrow.disabled = false;
                    startGauge();
                }
            }, 1500);
        }
    }
    function openShop() {
        buffCardsContainer.innerHTML = '';
        let shuffled = [...buffPool].sort(() => 0.5 - Math.random());
        let choices = shuffled.slice(0, 3);
        choices.forEach(buff => {
            const card = document.createElement('div');
            card.className = 'buff-card';
            card.innerHTML = `<h3>${buff.name}</h3><p>${buff.desc}</p>`;
            card.addEventListener('click', () => {
                buff.apply(); 
                closeShopAndNextStage();
            });
            buffCardsContainer.appendChild(card);
        });
        shopOverlay.classList.add('active');
    }
    function closeShopAndNextStage() {
        shopOverlay.classList.remove('active');
        state.stage++;
        checkAchievements();
        btnNext.disabled = true;
        btnBorrow.disabled = false;
        state.isFlipping = false;
        applyEnvironment();
        updateUI();
        startGauge();
    }
    btnBorrow.addEventListener('click', () => {
        state.money += 10000;
        state.debt += 10000;
        updateUI();
        checkAchievements();
    });
    btnNext.addEventListener('click', () => {
        openShop(); 
    });
    btnRestart.addEventListener('click', () => initGame());
    document.getElementById('btn-gacha').addEventListener('click', () => {
        if (state.money >= 3000) {
            state.money -= 3000;
            const newBottle = bottleList[Math.floor(Math.random() * bottleList.length)];
            if (!state.unlockedBottles.includes(newBottle)) {
                state.unlockedBottles.push(newBottle);
                document.getElementById('gacha-msg').innerText = `新種発見！ 「${newBottle}」を手に入れた！`;
            } else {
                document.getElementById('gacha-msg').innerText = `「${newBottle}」が当たった！（重複）`;
            }
            document.getElementById('gacha-result-bottle').innerText = newBottle;
            document.getElementById('gacha-overlay').classList.add('active');
            updateUI();
        } else {
            alert('資金不足だ。');
        }
    });
    document.getElementById('btn-collection').addEventListener('click', () => {
        const list = document.getElementById('collection-list');
        list.innerHTML = '';
        bottleList.forEach(b => {
            const item = document.createElement('div');
            item.style.fontSize = '40px';
            item.style.padding = '10px';
            item.style.cursor = 'pointer';
            item.style.border = state.currentBottle === b ? '2px solid gold' : '2px solid transparent';
            if (state.unlockedBottles.includes(b)) {
                item.innerText = b;
                item.onclick = () => {
                    state.currentBottle = b;
                    document.getElementById('collection-overlay').classList.remove('active');
                    updateUI();
                };
            } else {
                item.innerText = '？';
                item.style.color = '#555';
            }
            list.appendChild(item);
        });
        document.getElementById('collection-overlay').classList.add('active');
    });
    document.getElementById('btn-achievements').addEventListener('click', () => {
        const list = document.getElementById('achievements-list');
        list.innerHTML = '';
        achievementsList.forEach(ach => {
            const isUnlocked = state.unlockedAchievements.includes(ach.id);
            const item = document.createElement('div');
            item.style.border = '2px solid ' + (isUnlocked ? '#f1c40f' : '#555');
            item.style.padding = '10px';
            item.style.marginBottom = '10px';
            item.style.background = isUnlocked ? 'rgba(241, 196, 15, 0.2)' : 'rgba(0,0,0,0.5)';
            item.innerHTML = `
                <div style="font-size: 18px; color: ${isUnlocked ? '#f1c40f' : '#888'};">
                    ${isUnlocked ? '🏆 ' : '🔒 '}${ach.name}
                </div>
                <div style="font-size: 12px; color: #ccc;">${ach.desc}</div>
            `;
            list.appendChild(item);
        });
        document.getElementById('achievements-overlay').classList.add('active');
    });
    function checkAchievements() {
        const saved = localStorage.getItem('achievements');
        if (saved) state.unlockedAchievements = JSON.parse(saved);
        let newlyUnlocked = [];
        if (state.bestConsecutiveWins >= 3) newlyUnlocked.push('streak_3');
        if (state.bestConsecutiveWins >= 7) newlyUnlocked.push('streak_7');
        if (state.bestConsecutiveWins >= 15) newlyUnlocked.push('streak_15');
        if (state.lastFlipDist <= 1) newlyUnlocked.push('perfect_center');
        if (state.debt >= 1000000) newlyUnlocked.push('debt_king');
        if (state.money >= 1000000) newlyUnlocked.push('high_roller');
        if (state.stage >= 100) newlyUnlocked.push('stage_100');
        newlyUnlocked.forEach(id => {
            if (!state.unlockedAchievements.includes(id)) {
                state.unlockedAchievements.push(id);
                const ach = achievementsList.find(a => a.id === id);
                showAchievementToast(ach.name);
            }
        });
        localStorage.setItem('achievements', JSON.stringify(state.unlockedAchievements));
    }
    function showAchievementToast(name) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = 'rgba(241, 196, 15, 0.9)';
        toast.style.color = '#000';
        toast.style.padding = '10px 20px';
        toast.style.border = '4px double #000';
        toast.style.zIndex = '1000';
        toast.style.fontFamily = "'DotGothic16', sans-serif";
        toast.style.animation = 'fadeOut 3s forwards';
        toast.innerHTML = `🏆 実績解除: ${name}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    const style = document.createElement('style');
    style.innerHTML = '@keyframes fadeOut { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }';
    document.head.appendChild(style);
    initGame();
</script>
</body>
</html>
